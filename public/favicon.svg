<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="gh-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <style>
      .text-logo {
        font-family: 'Outfit', 'Inter', system-ui, sans-serif;
        font-weight: 800;
        font-size: 68px;
        fill: url(#gh-gradient);
      }
    </style>
  </defs>
  <!-- Render the initials with the theme's core colors -->
  <text x="50%" y="68" dominant-baseline="middle" text-anchor="middle" class="text-logo">GH.</text>
</svg>
